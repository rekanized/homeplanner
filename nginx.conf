server {
    listen 8080;
    listen [::]:8080;
    root /var/www/html/public;
    index index.php index.html index.htm;

    server_name _;

    location ^~ /livewire- {
        expires off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/livewire/livewire(\.min)?\.js$ {
        expires off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Set default values for proxy headers if they are missing
    set $x_forwarded_proto $http_x_forwarded_proto;
    if ($x_forwarded_proto = "") { set $x_forwarded_proto $scheme; }
    
    set $x_forwarded_host $http_x_forwarded_host;
    if ($x_forwarded_host = "") { set $x_forwarded_host $host; }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;

        # Forward proxy headers with defaults
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires max;
        log_not_found off;
    }
}